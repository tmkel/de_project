version: 2

models:
  - name: mart_daily_intensity_by_region
    description: "Daily carbon intensity aggregated from half-hourly data, by region"
    columns:
      - name: daily_intensity_key
        data_tests:
          - unique
          - not_null
      - name: period_date
        data_tests:
          - not_null
      - name: region_id
        data_tests:
          - not_null

  - name: mart_daily_generation_mix
    description: "Daily generation mix by region and fuel type. Note: averages are unweighted (no volume data available)."
    columns:
      - name: daily_generation_key
        data_tests:
          - unique
          - not_null
      - name: period_date
        data_tests:
          - not_null
      - name: fuel_type
        data_tests:
          - not_null

  - name: mart_forecast_accuracy
    description: "Daily forecast accuracy metrics (national only — regional API has no actuals)"
    columns:
      - name: forecast_accuracy_key
        data_tests:
          - unique
          - not_null
      - name: period_date
        data_tests:
          - not_null