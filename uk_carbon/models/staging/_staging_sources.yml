version: 2

sources:
  - name: raw
    description: "Raw data loaded by the Python ingestion pipeline"
    schema: public
    tables:
      - name: raw_national_intensity
        description: "Half-hourly national carbon intensity (forecast + actual)"
        columns:
          - name: from_date
            tests:
              - not_null
          - name: to_date
            tests:
              - not_null

      - name: raw_generation
        description: "Half-hourly national generation mix by fuel type"
        columns:
          - name: from_date
            tests:
              - not_null
          - name: to_date
            tests:
              - not_null
          - name: fuel
            tests:
              - not_null

      - name: raw_regional
        description: "Half-hourly regional intensity and generation mix"
        columns:
          - name: from_date
            tests:
              - not_null
          - name: to_date
            tests:
              - not_null
          - name: regionid
            tests:
              - not_null
          - name: fuel
            tests:
              - not_null
